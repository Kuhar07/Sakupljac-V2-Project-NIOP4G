<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8" />
    <meta http-equiv="Content-Security-Policy"
        content="default-src 'self'; script-src 'self' https://www.gstatic.com; style-src 'self' 'unsafe-inline'; connect-src 'self' https://*.googleapis.com https://*.firebaseio.com https://securetoken.googleapis.com https://identitytoolkit.googleapis.com wss://*.firebaseio.com; frame-src https://accounts.google.com;" />
    <link rel="stylesheet" href="styles.css">
    <title>Sakupljač</title>
</head>

<body>
    <canvas id="bg-canvas"></canvas>
    <!-- Izbornik -->
    <div id="menu">
        <div id="menu-content">
            <div class="game-logo">Sakupljač</div>
            <div class="menu-buttons">
                <button id="new-game-btn" class="menu-btn">🎮 Nova Igra</button>
                <button id="online-game-btn" class="menu-btn">🌐 Online Igra</button>
                <button id="leaderboard-btn" class="menu-btn">🏆 Leaderboard</button>
            </div>
        </div>
    </div>

    <!-- Ekran za prijavu (online mod) -->
    <div id="auth-screen" style="display:none;">
        <div id="auth-content">
            <div class="game-logo">Sakupljač</div>
            <p id="auth-status" style="margin-bottom: 20px; color: var(--user-bar-color); font-size: 0.95rem;">Prijavite se za online igru.</p>
            <div class="menu-buttons">
                <button id="sign-in-btn" class="menu-btn">🔑 Prijavi se s Google računom</button>
                <button id="auth-cancel-btn" class="menu-btn">Odustani</button>
            </div>
        </div>
    </div>

    <!-- Online lobby -->
    <div id="online-lobby" style="display:none;">
        <div id="online-lobby-content">
            <div class="game-logo">Sakupljač</div>

            <div id="user-bar">
                <span id="user-display-name"></span>
                <button id="sign-out-btn">Odjavi se</button>
            </div>

            <div class="menu-buttons">
                <button id="create-casual-btn" class="menu-btn">🎮 Casual Igra</button>
                <button id="create-ranked-btn" class="menu-btn">🏅 Ranked Igra</button>
                <button id="join-game-btn" class="menu-btn">🔗 Pridruži se</button>
                <button id="online-leaderboard-btn" class="menu-btn">🏆 Leaderboard</button>
                <button id="online-back-btn" class="menu-btn">← Natrag</button>
            </div>

            <div id="create-game-options" style="display:none; margin-top:20px;">
                <p id="create-mode-label" style="font-weight:600; margin-bottom:12px;"></p>
                <div id="casual-options">
                    <label for="lobby-grid-size" style="display:block; margin-bottom:5px; font-size:0.88rem;">Veličina polja</label>
                    <select id="lobby-grid-size" style="width:100%; box-sizing:border-box; margin-bottom:12px; padding:8px 10px; border-radius:6px; border:1px solid var(--cell-border); background:var(--bg-color); color:var(--text-color); font-size:0.95rem;">
                        <option value="4">4×4</option>
                        <option value="6" selected>6×6</option>
                        <option value="8">8×8</option>
                        <option value="10">10×10</option>
                        <option value="12">12×12</option>
                    </select>
                    <label style="display:flex; align-items:center; gap:8px; margin-bottom:14px; font-size:0.88rem; cursor:pointer;">
                        <input type="checkbox" id="online-timer-checkbox" style="margin:0;" /> <span id="online-timer-label-text">Igraj s timerom (30s po potezu)</span>
                    </label>
                </div>
                <div id="ranked-info" style="display:none; margin-bottom:14px; font-size:0.9rem; color:var(--user-bar-color);">
                    <p style="margin:0;">Ploča: 8×8 &nbsp;|&nbsp; Timer: 30s po potezu</p>
                </div>
                <div style="display:flex; gap:8px; justify-content:center;">
                    <button id="confirm-create-btn" class="menu-btn" style="width:auto; padding:9px 22px;">Stvori sobu</button>
                    <button id="cancel-create-btn" class="menu-btn" style="width:auto; padding:9px 22px;">Odustani</button>
                </div>
            </div>

            <div id="waiting-room" style="display:none; margin-top:20px; text-align:center;">
                <p style="color:var(--user-bar-color); font-size:0.92rem; margin-bottom:8px;">Čekanje protivnika... Kod sobe:</p>
                <h2 id="room-code-display" style="letter-spacing:6px; font-size:2.2rem; margin:0 0 16px 0;"></h2>
                <button id="cancel-wait-btn" class="menu-btn" style="width:auto; padding:9px 22px;">Odustani</button>
            </div>

            <div id="join-room-form" style="display:none; margin-top:20px;">
                <label style="display:block; margin-bottom:5px; font-size:0.88rem;">Kod sobe</label>
                <input type="text" id="room-code-input" placeholder="Unesite kod" maxlength="6"
                    style="text-transform:uppercase; width:100%; box-sizing:border-box; padding:8px 10px; border-radius:6px; border:1px solid var(--cell-border); background:var(--bg-color); color:var(--text-color); font-size:0.95rem; margin-bottom:12px; display:block;" />
                <div style="display:flex; gap:8px; justify-content:center;">
                    <button id="confirm-join-btn" class="menu-btn" style="width:auto; padding:9px 22px;">Pridruži se</button>
                    <button id="cancel-join-btn" class="menu-btn" style="width:auto; padding:9px 22px;">Odustani</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Dijalog za unos imena (lokalni mod) -->
    <div id="name-dialog" class="dialog">
        <div class="dialog-content">
            <h2>Nova Igra</h2>
            <label for="player1-name">Ime igrača 1</label>
            <input type="text" id="player1-name" placeholder="Igrač 1" />
            <label for="player2-name">Ime igrača 2</label>
            <input type="text" id="player2-name" placeholder="Igrač 2" />
            <label for="grid-size-select">Veličina polja</label>
            <select id="grid-size-select">
                <option value="4">4×4</option>
                <option value="6" selected>6×6</option>
                <option value="8">8×8</option>
                <option value="10">10×10</option>
                <option value="12">12×12</option>
            </select>
            <label style="display:flex; align-items:center; gap:8px; margin-top:4px; cursor:pointer;">
                <input type="checkbox" id="timer-checkbox" style="width:auto; margin:0;" /> <span id="local-timer-label-text">Igraj s timerom (30s po potezu)</span>
            </label>
            <div class="dialog-buttons">
                <button id="start-btn" class="dialog-btn">Započni Igru</button>
                <button id="cancel-btn" class="dialog-btn secondary">Odustani</button>
            </div>
        </div>
    </div>

    <!-- Dijalog za kraj igre -->
    <div id="game-over-dialog" class="dialog">
        <div class="dialog-content">
            <h2 id="game-over-title">Kraj Igre!</h2>
            <p id="game-over-message"></p>
            <div class="dialog-buttons">
                <button id="new-game-after-btn" class="dialog-btn">Nova Igra</button>
                <button id="menu-btn" class="dialog-btn secondary">Glavni Izbornik</button>
            </div>
        </div>
    </div>

    <!-- Dijalog za leaderboard -->
    <div id="leaderboard-dialog" class="dialog">
        <div class="dialog-content">
            <h2>Leaderboard</h2>
            <div id="leaderboard-list"></div>
            <div class="dialog-buttons">
                <button id="close-leaderboard-btn">Zatvori</button>
            </div>
        </div>
    </div>

    <!-- Dijalog za potvrdu reseta -->
    <div id="confirm-reset-dialog" class="dialog">
        <div class="dialog-content">
            <h2>Resetiraj Igru</h2>
            <p>Jeste li sigurni da želite resetirati igru?</p>
            <div class="dialog-buttons">
                <button id="confirm-reset-btn" class="dialog-btn">Da</button>
                <button id="cancel-reset-btn" class="dialog-btn secondary">Ne</button>
            </div>
        </div>
    </div>

    <!-- Generički info dijalog -->
    <div id="info-dialog" class="dialog">
        <div class="dialog-content">
            <p id="info-message"></p>
            <div class="dialog-buttons">
                <button id="close-info-btn" class="dialog-btn">OK</button>
            </div>
        </div>
    </div>

    <!-- Dijalog za pravila -->
    <div id="rules-dialog" class="dialog">
        <div class="dialog-content">
            <h2>Pravila</h2>
            <p style="font-size: 18px; margin: 20px 0;">Priča je jednostavna, majmune.</p>
            <div class="dialog-buttons">
                <button id="close-rules-btn">Zatvori</button>
            </div>
        </div>
    </div>

    <!-- Područje igre -->
    <div id="game-area" style="display: none;">
        <div id="game-container">
            <!-- Zaglavlje s imenima i rezultatima -->
            <div id="game-header">
                <div class="player-info player1-info">
                    <div class="player-name" id="player1-display"></div>
                    <div class="player-score" id="player1-score">0</div>
                </div>
                <div id="status"></div>
                <div class="player-info player2-info">
                    <div class="player-name" id="player2-display"></div>
                    <div class="player-score" id="player2-score">0</div>
                </div>
            </div>

            <!-- Timer (online mod) -->
            <div id="turn-timer"></div>

            <!-- Mreža igre -->
            <div id="grid"></div>

            <!-- Gumbi -->
            <div id="game-controls">
                <button id="reset-btn" class="control-btn">Resetiraj Igru</button>
                <button id="back-to-menu-btn" class="control-btn secondary">Glavni Izbornik</button>
            </div>
        </div>
    </div>

    <!-- Bottom Right Controls -->
    <div style="position: fixed; bottom: 20px; right: 20px; z-index: 1000; display: flex; gap: 10px;">
        <button id="theme-toggle-btn" style="padding: 10px 15px; border-radius: 6px; border: none; cursor: pointer; font-weight: bold; background-color: #343a40; color: white; box-shadow: 0 4px 6px rgba(0,0,0,0.3); font-size: 14px;" title="Toggle Light/Dark Mode">🌙</button>
        <button id="lang-toggle-btn" style="padding: 10px 15px; border-radius: 6px; border: none; cursor: pointer; font-weight: bold; background-color: #007bff; color: white; box-shadow: 0 4px 6px rgba(0,0,0,0.3); font-size: 14px;" title="Switch Language">HR</button>
    </div>

    <script src="background.js"></script>
    <script src="i18n.js"></script>
    <script src="script.js"></script>
    <script type="module" src="online.js"></script>
</body>

</html>
